<div class="layout">
  <div class="main-content">
    
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
        <div>
          <h2>Data Grid Pivot Demo</h2>
          <p class="subtitle">Interactive drag-and-drop grouping with Angular CDK</p>
        </div>
        
        <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
          <!-- Export Dropdown -->
          <div class="export-dropdown-wrapper">
            <button class="export-btn" (click)="toggleExportMenu($event)">
              <i class="pi pi-download"></i>
              <span>Export</span>
              <i class="pi pi-chevron-down" style="font-size: 10px; margin-left: 4px;"></i>
            </button>
            <div class="export-menu" *ngIf="showExportMenu">
              <button class="export-menu-item" (click)="exportCSV()">
                <i class="pi pi-file"></i> CSV
              </button>
              <button class="export-menu-item" (click)="exportXLSX()">
                <i class="pi pi-file-excel"></i> XLSX
              </button>
              <button class="export-menu-item" (click)="exportPDF()">
                <i class="pi pi-file-pdf"></i> PDF
              </button>
              <button class="export-menu-item" (click)="exportPNG()">
                <i class="pi pi-image"></i> PNG
              </button>
            </div>
          </div>

          <!-- Pivot Mode Toggle -->
          <div class="pivot-toggle-container">
            <label class="switch">
              <input type="checkbox" [checked]="isPivotMode" (change)="togglePivotMode()">
              <span class="slider round"></span>
            </label>
            <span class="toggle-label" [class.active]="isPivotMode">Pivot Mode</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Layout Manager Toolbar -->
    <div class="layout-toolbar">
      <div class="layout-save">
        <input type="text" [(ngModel)]="layoutName" placeholder="Name your layout..." class="layout-input">
        <button class="btn btn-save" [disabled]="isSaving || !layoutName" (click)="saveLayout()">
          {{ isSaving ? 'Saving...' : 'Save Layout' }}
        </button>
      </div>
      <div class="layout-load">
        <select class="layout-select" (change)="loadLayout(savedLayouts[$any($event.target).value]?.state)">
          <option value="" disabled selected>Load a Layout...</option>
          <option *ngFor="let layout of savedLayouts; let i = index" [value]="i">
            {{ layout.name }}
          </option>
        </select>
        <span *ngIf="isLoadingLayouts" class="loading-spinner"><i class="pi pi-spin pi-spinner"></i></span>
      </div>
    </div>

    <!-- Drag & Drop Grouping Panel -->
    <div class="grouping-container">
      <!-- Available Fields -->
      <div class="grouping-box">
        <label>Available Fields</label>
        <div class="pill-container"
             id="availableList"
             cdkDropList
             [cdkDropListData]="availableGroupingFields"
             [cdkDropListConnectedTo]="['groupedList', 'pivotList', 'valueList']"
             cdkDropListOrientation="horizontal"
             (cdkDropListDropped)="drop($event)">
          <div class="row-pill" *ngFor="let field of availableGroupingFields" cdkDrag>
            <span class="pill-drag-handle">:::</span>
            {{field}}
          </div>
        </div>
      </div>

      <!-- Active Groups -->
      <div class="grouping-box active-groups">
        <label><i class="pi pi-list"></i> Group Rows</label>
        <div class="pill-container group-drop-zone"
             id="groupedList"
             cdkDropList
             [cdkDropListData]="groupedFields"
             [cdkDropListConnectedTo]="['pivotList', 'valueList']"
             cdkDropListOrientation="horizontal"
             (cdkDropListDropped)="drop($event)">
             
          <div class="empty-group" *ngIf="groupedFields.length === 0" style="position: absolute; pointer-events: none;">Drag here...</div>
          
          <ng-container *ngFor="let field of groupedFields; let last = last">
            <div class="row-pill grouped" cdkDrag>
              <span class="pill-drag-handle">:::</span>
              {{field}}
              <span class="pill-close" (click)="removeGroup(field, 'row')">✕</span>
            </div>
          </ng-container>

        </div>
      </div>

      <!-- Pivot Columns -->
      <div class="grouping-box pivot-groups">
        <label><i class="pi pi-table"></i> Pivot Columns</label>
        <div class="pill-container pivot-drop-zone"
             id="pivotList"
             cdkDropList
             [cdkDropListData]="pivotFields"
             [cdkDropListConnectedTo]="['groupedList', 'valueList']"
             cdkDropListOrientation="horizontal"
             (cdkDropListDropped)="drop($event)">
             
          <div class="empty-group" *ngIf="pivotFields.length === 0 || !pivotFields" style="position: absolute; pointer-events: none;">Drag here...</div>
          
          <ng-container *ngFor="let field of pivotFields; let last = last">
            <div class="row-pill pivoted" cdkDrag>
              <span class="pill-drag-handle">:::</span>
              {{field}}
              <span class="pill-close" (click)="removeGroup(field, 'pivot')">✕</span>
            </div>
          </ng-container>

        </div>
      </div>

      <!-- Values (Metrics) -->
      <div class="grouping-box value-groups">
        <label><i class="pi pi-calculator"></i> Values</label>
        <div class="pill-container value-drop-zone"
             id="valueList"
             cdkDropList
             [cdkDropListData]="valueFields"
             [cdkDropListConnectedTo]="['groupedList', 'pivotList']"
             cdkDropListOrientation="horizontal"
             (cdkDropListDropped)="drop($event)">
             
          <div class="empty-group" *ngIf="valueFields.length === 0 || !valueFields" style="pointer-events: none;">Drag here...</div>
          
          <ng-container *ngFor="let field of valueFields; let last = last">
            <div class="row-pill valued" cdkDrag>
              <span class="pill-drag-handle">:::</span>
              Σ {{field}}
              <span class="pill-close" (click)="removeGroup(field, 'value')">✕</span>
            </div>
          </ng-container>

        </div>
      </div>
    </div>

    <!-- Grid Container -->
    <div class="grid-container">
      <app-tabulator 
        [data]="pivotData" 
        [columns]="tabulatorColumns" 
        [groupBy]="groupByField">
      </app-tabulator>
    </div>

  </div>
</div>
